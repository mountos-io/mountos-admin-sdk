version: "1"
basePath: /api/v1

jwt:
  algorithm: EdDSA
  subject: mountos:provider
  audience: mountos/appserv
  scope: service
  keyFormat: "raw 64-byte ED25519 private key, base64-encoded (standard encoding)"
  claims:
    kfp: "hex(sha256(ed25519_pubkey)[:16])"

errorCodes:
  - { code: 10001, name: AUTHENTICATION_REQUIRED }
  - { code: 10002, name: INVALID_SESSION }
  - { code: 10003, name: INVALID_CREDENTIALS }
  - { code: 10004, name: SESSION_EXPIRED }
  - { code: 10200, name: INVALID_REQUEST_FORMAT }
  - { code: 10201, name: VALIDATION_FAILED }
  - { code: 10202, name: MISSING_PARAMETER }
  - { code: 10900, name: INTERNAL_ERROR }
  - { code: 10901, name: SERVICE_UNAVAILABLE }
  - { code: 10902, name: DATABASE_ERROR }

# Field notation:
#   "name: type"   — present (model/response) or optional (request)
#   "name: type!"  — required (request only)
#   "name: type?"  — optional/omitempty
#   "name: type=X" — query param with default value X
# Types: string, int64, int32, int, bool, datetime, object, json, EnumName, TypeName[]

enums:
  LicenseStatus:
    - valid
    - expiring
    - grace
    - expired_access
    - expired

  LicenseQuotaState:
    - ok
    - exceeded
    - unknown

types:
  Ref:
    - "id: int64"
    - "name: string"

  Account:
    - "id: int64"
    - "name: string"
    - "description: string"
    - "iconUrl: string?"
    - "providerInfo: object?"
    - "liveVolume: int64"
    - "totalVolume: int64"
    - "isActive: bool"
    - "locked: bool"
    - "createdAt: datetime"
    - "updatedAt: datetime"

  User:
    - "id: int64"
    - "accountId: int64"
    - "username: string"
    - "email: string"
    - "name: string"
    - "isActive: bool"

  Region:
    - "id: int64"
    - "exportId: string"
    - "accountId: int64"
    - "name: string"
    - "dns: string"
    - "liveVolume: int64"
    - "totalVolume: int64"
    - "isActive: bool"
    - "createdAt: datetime"
    - "updatedAt: datetime"

  Storage:
    - "id: int64"
    - "account: Ref"
    - "regionInfo: Ref"
    - "name: string"
    - "description: string?"
    - "storageType: string"
    - "providerType: string"
    - "blockType: string?"
    - "endpoint: string"
    - "region: string?"
    - "bucket: string?"
    - "base: string?"
    - "blockRegion: string?"
    - "blockSize: int32?"
    - "isActive: bool"
    - "createdAt: datetime"
    - "updatedAt: datetime"

  Volume:
    - "id: int64"
    - "account: Ref"
    - "storage: Ref"
    - "region: Ref"
    - "name: string"
    - "description: string?"
    # Immutable storage personality picked at create time. One of:
    # "general" | "iceberg" (extensible to "s3-tables", "delta", ...).
    # Empty/legacy values ("object", "block") fall back to general semantics.
    # Drives admin-client kind badge + client-side mount gating
    # (mfuse/mountosx/mountos-windows/mountos-hdfs-sdk refuse to mount
    # iceberg volumes as a regular filesystem — engines must use the
    # lake REST + S3 endpoints instead).
    - "volumeType: string"
    - "encryption: bool"
    - "quotaLimit: int64"
    - "liveVolume: int64"
    - "totalVolume: int64"
    - "pendingVolume: int64"
    - "liveInactiveVolume: int64"
    - "restrictByLiveVolume: bool"
    - "locked: bool"
    - "retentionPeriod: int32"
    - "gracePeriod: int32"
    - "isActive: bool"
    - "isCleanupMetaEnabled: bool"
    - "isCleanupStorageEnabled: bool"
    - "isCleanupVaultEnabled: bool"
    - "createdAt: datetime"
    - "updatedAt: datetime"

  VolumeSizePoint:
    - "bucketEnd: datetime"
    - "liveVolume: int64"
    - "totalVolume: int64"
    - "pendingVolume: int64"
    - "liveInactiveVolume: int64"

  Fork:
    - "fid: int32"
    - "name: string"
    - "parentFid: int32"
    - "parentName: string"
    - "snapshotTs: int64"
    - "createdBy: string?"
    - "createdAt: int64"
    - "childrenCount: int32"
    - "inactive: bool?"
    - "inactiveAt: int64?"
    - "status: string"
    - "size: int64"

  AuditLog:
    - "id: int64"
    - "title: string"
    - "description: string?"
    - "subject: string?"
    - "success: bool"
    - "data: json?"
    - "createdBy: string?"
    - "node: string?"
    - "accountId: int64?"
    - "createdAt: datetime?"
    - "updatedAt: datetime?"

  ServiceAlert:
    - "id: int64"
    - "alertId: string"
    - "source: string"
    - "nodeId: string"
    - "severity: int"
    - "category: string"
    - "title: string"
    - "description: string?"
    - "region: Ref?"
    - "account: Ref?"
    - "eventTime: datetime"
    - "resolvedAt: datetime?"
    - "createdAt: datetime?"

  RegionAlert:
    - "id: int64"
    - "alertId: string"
    - "source: string"
    - "nodeId: string"
    - "severity: int"
    - "category: string"
    - "title: string"
    - "description: string?"
    - "eventTime: datetime"
    - "resolvedAt: datetime?"
    - "createdAt: datetime?"

  AlertCountResponse:
    - "active: int64"
    - "recent: int64"
    - "infoCount: int64"
    - "warningCount: int64"
    - "criticalCount: int64"

  ServiceNode:
    - "id: int64"
    - "regionId: int64"
    - "serviceType: string"
    - "nodeId: string"
    - "advertiseAddr: string"
    - "rpcAddr: string?"
    - "metadata: object?"
    - "status: string"
    - "lastHeartbeat: int64?"
    - "isActive: bool"
    - "memUsage: float?"
    - "sysLoad: int?"

  ClientSession:
    - "id: int64"
    - "account: Ref"
    - "region: Ref"
    - "volume: Ref"
    - "user: Ref?"
    - "clientType: string"
    - "osName: string"
    - "osVersion: string?"
    - "appVersion: string?"
    - "hostname: string?"
    - "ipAddr: string"
    - "mountMode: string?"
    - "mountPath: string?"
    - "forkName: string?"
    - "isTemporaryFork: bool"
    - "metadata: json?"
    - "metrics: json?"
    - "status: string"
    - "lastHeartbeat: int64?"
    - "connectedAt: int64?"
    - "disconnectedAt: int64?"
    - "isActive: bool"

  SessionSummaryStatusEntry:
    - "clientType: string"
    - "status: string"
    - "count: int64"

  SessionSummaryFacet:
    - "label: string"
    - "count: int64"

  SessionSummary:
    - "byStatus: SessionSummaryStatusEntry[]"
    - "byPlatform: SessionSummaryFacet[]"
    - "byOsName: SessionSummaryFacet[]"
    - "regionCount: int64"
    - "volumeCount: int64"
    - "hostCount: int64"
    - "unhealthyCount: int64"

  DiscoverMetaResponse:
    - "regionId: int64"
    - "region: string"
    - "endpoints: DiscoverEndpoint[]"

  DiscoverEndpoint:
    - "nodeId: string"
    - "addr: string"
    - "status: string"

  RegionVolumeMetrics:
    - "regionId: int64"
    - "regionName: string"
    - "volumeCount: int64"
    - "totalVolumeUsed: int64"
    - "totalQuotaLimit: int64"

  DashboardUser:
    - "id: string"
    - "name: string"
    - "email: string?"
    - "role: string"
    - "username: string?"
    - "accountId: int64?"
    - "userId: int64?"
    - "volumeId: int64?"
    - "exp: int64?"

  DashboardStats:
    - "userCount: int64"
    - "volumeCount: int64"
    - "regionCount: int64"
    - "storageCount: int64"
    - "totalVolumeUsed: int64"
    - "totalQuotaLimit: int64"
    - "activeSessionCount: int64"
    - "regionBreakdown: RegionVolumeMetrics[]"

  LicenseQuota:
    - "state: LicenseQuotaState"
    - "liveVolume: int64"
    - "totalVolume: int64"
    - "generation: int64"
    - "lastTransitionAtMs: int64"

  LicenseDetails:
    - "licenseId: string"
    - "licensee: string"
    - "contact: string"
    - "licenseType: string"
    - "issuedAt: string"
    - "expiresAt: string"
    - "gracePeriodDays: int"
    - "expiredAccessDays: int"
    - "maxNodes: int64"
    - "maxVolumes: int64"
    - "maxUsers: int64"
    - "maxAccounts: int64"
    - "maxRegions: int64"
    - "maxStorageBytes: int64"
    - "status: LicenseStatus"
    - "daysRemaining: int"
    - "graceEndsAt: string"
    - "graceDaysLeft: int"
    - "expiredAccessEndsAt: string"
    - "expiredAccessDaysLeft: int"
    - "quota: LicenseQuota"

  LicenseTerms:
    - "terms: string"

resources:
  - name: Accounts
    path: /accounts
    endpoints:
      - action: create
        method: POST
        path: /create
        request:
          - "name: string!"
          - "description: string"
          - "iconUrl: string"
          - "providerInfo: object"
        response:
          - "id: int64"

      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "page: int=1"
          - "limit: int=10"
        responseType: Account

      - action: get
        method: GET
        path: /:accountId
        responseType: Account

      - action: edit
        method: PUT
        path: /:accountId/edit
        request:
          - "name: string!"
          - "description: string"
          - "iconUrl: string"
          - "providerInfo: object"
        response:
          - "id: int64"

      - action: lock
        method: POST
        path: /:accountId/lock
        response:
          - "id: int64"

      - action: unlock
        method: POST
        path: /:accountId/unlock
        response:
          - "id: int64"

      - action: deactivate
        method: POST
        path: /:accountId/deactivate
        response:
          - "id: int64"

  - name: Users
    path: /users
    endpoints:
      - action: add
        method: POST
        path: /add
        request:
          - "accountId: int64!"
          - "username: string!"
          - "email: string!"
          - "name: string"
          - "providerInfo: object"
        response:
          - "id: int64"

      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "accountId: int64!"
          - "search: string"
          - "page: int=1"
          - "limit: int=10"
        responseType: User

      - action: get
        method: GET
        path: /:userId
        responseType: User

      - action: edit
        method: PUT
        path: /:userId/edit
        request:
          - "username: string!"
          - "email: string!"
          - "name: string"
          - "providerInfo: object"
        response:
          - "id: int64"

      - action: deactivate
        method: POST
        path: /:userId/deactivate
        response:
          - "id: int64"

  - name: Regions
    path: /regions
    endpoints:
      - action: create
        method: POST
        path: /create
        request:
          - "accountId: int64!"
          - "name: string!"
          - "dns: string!"
        response:
          - "id: int64"

      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "page: int=1"
          - "limit: int=10"
        responseType: Region

      - action: get
        method: GET
        path: /:regionId
        responseType: Region

      - action: edit
        method: PUT
        path: /:regionId/edit
        request:
          - "accountId: int64!"
          - "name: string!"
          - "dns: string!"
        response:
          - "id: int64"

      - action: deactivate
        method: POST
        path: /:regionId/deactivate
        response:
          - "id: int64"

  - name: Storages
    path: /storages
    endpoints:
      - action: create
        method: POST
        path: /create
        request:
          - "accountId: int64!"
          - "regionId: int64!"
          - "name: string!"
          - "description: string"
          - "storageType: string!"
          - "providerType: string!"
          - "endpoint: string!"
          - "region: string"
          - "bucket: string"
          - "base: string"
          - "blockRegion: string"
          - "blockType: string"
          - "blockSize: int32"
          - "accessKey: string"
          - "secretKey: string"
        response:
          - "id: int64"

      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "accountId: int64!"
          - "search: string"
          - "regionId: int64"
          - "storageType: string"
          - "providerType: string"
          - "page: int=1"
          - "limit: int=10"
        responseType: Storage

      - action: get
        method: GET
        path: /:storageId
        responseType: Storage

      - action: edit
        method: PUT
        path: /:storageId/edit
        request:
          - "name: string!"
          - "description: string"
          - "endpoint: string"
          - "accessKey: string"
          - "secretKey: string"
        response:
          - "id: int64"

      - action: deactivate
        method: POST
        path: /:storageId/deactivate
        response:
          - "id: int64"

      - action: testBucket
        method: POST
        path: /test-bucket
        request:
          - "endpoint: string!"
          - "region: string"
          - "bucket: string!"
          - "accessKey: string!"
          - "secretKey: string!"
          - "providerType: string"
        response:
          - "bucketExists: bool"
          - "list: bool"
          - "write: bool"
          - "read: bool"
          - "delete: bool"
          - "multipart: bool"

      - action: testStorageBucket
        method: POST
        path: /:storageId/test-bucket
        response:
          - "bucketExists: bool"
          - "list: bool"
          - "write: bool"
          - "read: bool"
          - "delete: bool"
          - "multipart: bool"

  - name: Volumes
    path: /volumes
    pathParamTypes:
      forkName: string
    endpoints:
      - action: create
        method: POST
        path: /create
        request:
          - "accountId: int64!"
          - "storageId: int64!"
          - "name: string!"
          - "description: string"
          - "volumeType: string!"
          - "encryption: bool"
          - "encryptionKey: string"
          - "retentionPeriod: int32"
          - "gracePeriod: int32"
          - "quotaLimit: int64"
        response:
          - "id: int64"
          - "encryptionKey: string?"

      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "accountId: int64!"
          - "regionId: int64"
          - "storageId: int64"
          - "volumeType: string"
          - "locked: bool"
          - "page: int=1"
          - "limit: int=10"
        responseType: Volume

      - action: get
        method: GET
        path: /:volumeId
        responseType: Volume

      - action: edit
        method: PUT
        path: /:volumeId/edit
        # `volumeType` is intentionally absent: the storage personality is
        # immutable after create. appserv MUST reject any payload that
        # carries a `volumeType` field (even if it matches the current
        # value) so callers can't accidentally retype a populated volume.
        request:
          - "description: string"
          - "retentionPeriod: int32"
          - "gracePeriod: int32"
          - "restrictByLiveVolume: bool"
        response:
          - "id: int64"

      - action: lock
        method: POST
        path: /:volumeId/lock
        response:
          - "id: int64"

      - action: unlock
        method: POST
        path: /:volumeId/unlock
        response:
          - "id: int64"

      - action: deactivate
        method: POST
        path: /:volumeId/deactivate
        request:
          - "isCleanupMetaEnabled: bool"
          - "isCleanupStorageEnabled: bool"
          - "isCleanupVaultEnabled: bool"
        response:
          - "id: int64"

      - action: generateApiKeys
        method: POST
        path: /:volumeId/api-keys/generate
        request:
          - "userId: int64!"
        response:
          - "apiKey: string"
          - "apiSecret: string"

      - action: revokeApiKey
        method: POST
        path: /:volumeId/api-keys/revoke
        request:
          - "apiKey: string!"

      - action: revokeApiKeysByUser
        method: POST
        path: /:volumeId/api-keys/revoke-by-user
        request:
          - "userId: int64!"

      - action: updateQuota
        method: PUT
        path: /:volumeId/quota
        request:
          - "quotaLimit: int64!"
        response:
          - "id: int64"

      - action: stats
        method: GET
        path: /:volumeId/stats
        response:
          - "volumeId: string"
          - "liveVolume: int64"
          - "totalVolume: int64"
          - "pendingVolume: int64"
          - "liveInactiveVolume: int64"
          - "restrictByLiveVolume: bool"

      - action: sizeHistory
        method: GET
        path: /:volumeId/size-history
        query:
          - "from: string"
          - "to: string"
        response:
          - "points: VolumeSizePoint[]"

      - action: createFork
        method: POST
        path: /:volumeId/forks/create
        request:
          - "name: string!"
          - "parentName: string"
          - "asOf: int64?"
          # volumeType: "general" (default) | "iceberg"
          # General forks operate on the file/object volume; iceberg forks
          # branch the lake catalog (separate fork namespace, COW overlay
          # via lake_fork_view).
          - "volumeType: string?"
        responseType: Fork

      - action: listForks
        method: GET
        path: /:volumeId/forks
        # ?volumeType=iceberg → list lake forks; default = general.
        query:
          - "volumeType: string?"
        responseType: Fork
        responseArray: true

      - action: listAllForks
        method: GET
        path: /:volumeId/forks?include_inactive=true
        query:
          - "volumeType: string?"
        responseType: Fork
        responseArray: true

      - action: deleteFork
        method: POST
        path: /:volumeId/forks/:forkName/delete
        request:
          - "force: bool"
          - "volumeType: string?"
        response:
          - "inactivatedFids: int32[]"

      - action: restoreFork
        method: POST
        path: /:volumeId/forks/:forkName/restore
        request:
          - "volumeType: string?"
        responseType: Fork

  - name: AuditLogs
    path: /audit-logs
    endpoints:
      - action: list
        method: GET
        path: /list
        pagination: cursor
        query:
          - "accountId: int64"
          - "cursor: int64"
          - "limit: int=20"
          - "subject: string"
        responseType: AuditLog

  - name: RegionAuditLogs
    path: /regions/:regionId/audit-logs
    endpoints:
      - action: list
        method: GET
        path: /list
        pagination: cursor
        query:
          - "cursor: int64"
          - "limit: int=20"
          - "subject: string"
          - "node: string"
        responseType: AuditLog

  - name: ServiceNodes
    path: /regions/:regionId/nodes
    pathParamTypes:
      nodeId: string
    endpoints:
      - action: list
        method: GET
        path: /
        query:
          - "serviceType: string"
          - "status: string"
          - "inactiveHours: int"
        responseType: ServiceNode
        responseArray: true

      - action: stats
        method: GET
        path: /:nodeId/stats
        responseType: string

  - name: Nodes
    path: /nodes
    endpoints:
      - action: listAll
        method: GET
        path: /
        query:
          - "serviceType: string"
          - "status: string"
          - "inactiveHours: int"
        responseType: ServiceNode
        responseArray: true

  - name: ClientSessions
    path: /client-sessions
    endpoints:
      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "accountId: int64"
          - "regionId: int64"
          - "volumeId: int64"
          - "userId: int64"
          - "clientType: string"
          - "status: string"
          - "isActive: string"
          - "osName: string"
          - "platform: string"
          - "search: string"
          - "page: int=1"
          - "limit: int=20"
        responseType: ClientSession

      - action: get
        method: GET
        path: /:sessionId
        responseType: ClientSession

      - action: summary
        method: GET
        path: /summary
        query:
          - "accountId: int64"
          - "volumeId: int64"
        responseType: SessionSummary

  - name: Discover
    path: /discover
    endpoints:
      - action: meta
        method: GET
        path: /meta
        query:
          - "access_key_id: string!"
        responseType: DiscoverMetaResponse

  - name: Dashboard
    path: /dashboard
    endpoints:
      - action: stats
        method: GET
        path: /stats
        query:
          - "accountId: int64!"
        responseType: DashboardStats

  - name: License
    path: /license
    endpoints:
      - action: get
        method: GET
        path: /
        responseType: LicenseDetails
      - action: terms
        method: GET
        path: /terms
        responseType: LicenseTerms

  - name: Alerts
    path: /alerts
    pathParamTypes:
      alertId: string
    endpoints:
      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "active: bool=true"
          - "accountId: int64"
          - "regionId: int64"
          - "severity: int"
          - "category: string"
          - "since: string"
          - "page: int=1"
          - "limit: int=20"
        responseType: ServiceAlert

      - action: count
        method: GET
        path: /count
        responseType: AlertCountResponse

      - action: resolve
        method: POST
        path: /:alertId/resolve

  - name: RegionAlerts
    path: /regions/:regionId/alerts
    pathParamTypes:
      regionId: int64
      alertId: string
    endpoints:
      - action: list
        method: GET
        path: /list
        pagination: page
        query:
          - "active: bool=true"
          - "severity: int"
          - "category: string"
          - "nodeId: string"
          - "since: string"
          - "page: int=1"
          - "limit: int=20"
        responseType: RegionAlert

      - action: count
        method: GET
        path: /count
        responseType: AlertCountResponse

      - action: resolve
        method: POST
        path: /:alertId/resolve

  - name: Vault
    path: /vault
    endpoints:
      - action: resync
        method: POST
        path: /resync
